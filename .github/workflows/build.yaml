name: Build & Test

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 1 * *"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check -L
